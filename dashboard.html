<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebdomadario — roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Palette ereditata da index.html */
    --bg: #FAF7F0;
    --bg-card: #FFFFFF;
    --bg-soft: #F4EFE3;
    --bg-node: #FAF7F0;
    --fg: #1A1A1A;
    --fg-soft: #2E2A23;
    --muted: #5C5C5C;
    --muted-light: #888888;
    --border: #E1DCC9;
    --border-strong: #C7BFA8;
    --rule: #D8D8D8;
    --accent-ia: #1F3A66;
    --accent-human: #B85C2E;
    --accent-cda: #3D6651;
    --accent-coord: #6E5A3E;
    --accent-mem: #6E4F8A;
    --accent-ia-soft: rgba(31, 58, 102, 0.10);
    --accent-cda-soft: rgba(61, 102, 81, 0.12);
    --accent-human-soft: rgba(184, 92, 46, 0.10);

    --font-display: "Cormorant Garamond", "Times New Roman", serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14110C;
      --bg-card: #1B1813;
      --bg-soft: #221E17;
      --bg-node: #1B1813;
      --fg: #ECE6D7;
      --fg-soft: #D6CFBF;
      --muted: #9A938A;
      --muted-light: #6F6A60;
      --border: #2D2922;
      --border-strong: #4A4438;
      --rule: #2D2922;
      --accent-ia: #7BA3D4;
      --accent-human: #E08355;
      --accent-cda: #87BFA1;
      --accent-coord: #C0A077;
      --accent-mem: #B89BD4;
      --accent-ia-soft: rgba(123, 163, 212, 0.14);
      --accent-cda-soft: rgba(135, 191, 161, 0.14);
      --accent-human-soft: rgba(224, 131, 85, 0.14);
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    padding: clamp(0.75rem, 2vw, 1.5rem);
    gap: clamp(0.75rem, 1.5vw, 1.25rem);
  }

  .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .head__title { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.01em; }
  .head__title .sep { color: var(--accent-coord); margin: 0 0.3rem; }
  .head__meta { display: flex; gap: 1.25rem; align-items: baseline; font-size: 0.82rem; color: var(--muted); }
  .counter strong { color: var(--accent-ia); font-weight: 600; font-variant-numeric: tabular-nums; }
  .counter .alta  { color: var(--accent-human); font-weight: 600; font-variant-numeric: tabular-nums; }

  .refresh-btn {
    font-family: var(--font-mono);
    font-size: 0.78rem; font-weight: 500;
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    color: var(--fg);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .refresh-btn:hover { background: var(--bg-soft); border-color: var(--accent-human); color: var(--accent-human); }
  .refresh-btn:disabled { opacity: 0.4; cursor: wait; }

  .main {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(0.75rem, 1.5vw, 1.25rem);
    min-height: 0;
  }
  @media (min-width: 980px) {
    .main { grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); }
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: clamp(0.75rem, 1.5vw, 1.25rem);
    min-width: 0;
  }

  .schema-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: clamp(0.6rem, 1.2vw, 1rem);
    min-height: 0;
    overflow: hidden;
  }
  .schema-wrap svg { width: 100%; height: auto; display: block; user-select: none; -webkit-user-select: none; }

  .node-rect {
    fill: var(--bg-node);
    stroke: var(--border-strong);
    stroke-width: 1;
    transition: stroke 0.15s, fill 0.15s;
  }
  .node-group { cursor: pointer; outline: none; }
  .node-group:hover .node-rect { stroke: var(--accent-coord); fill: var(--bg-soft); }
  .node-group:focus-visible .node-rect { stroke: var(--accent-human); stroke-width: 2; }
  .node-group[data-has-working="true"] .node-rect { stroke: var(--accent-ia); stroke-width: 1.5; fill: var(--accent-ia-soft); }
  .node-group[data-all-done="true"]    .node-rect { stroke: var(--accent-cda); stroke-width: 1.5; fill: var(--accent-cda-soft); }
  .node-group[aria-selected="true"] .node-rect {
    stroke: var(--accent-human) !important;
    stroke-width: 2 !important;
    fill: var(--accent-human-soft) !important;
  }

  .node-code     { font-family: var(--font-mono); font-size: 14px; font-weight: 700; fill: var(--fg-soft); letter-spacing: 0.04em; }
  .node-title    { font-family: var(--font-display); font-size: 17px; font-weight: 500; fill: var(--fg); font-style: italic; }
  .node-subtitle { font-family: var(--font-mono); font-size: 11px; fill: var(--muted); }
  .node-count    { font-family: var(--font-mono); font-size: 10px; font-weight: 600; fill: var(--muted); letter-spacing: 0.03em; }
  .node-group[data-has-working="true"] .node-count { fill: var(--accent-ia); }
  .node-group[data-all-done="true"]    .node-count { fill: var(--accent-cda); }

  .bar-bg { fill: var(--border); }
  .bar-fg { fill: var(--accent-coord); }
  .node-group[data-has-working="true"] .bar-fg { fill: var(--accent-ia); }
  .node-group[data-all-done="true"]    .bar-fg { fill: var(--accent-cda); }

  .milestone-rect { fill: var(--bg-node); stroke: var(--accent-coord); stroke-width: 1.5; }
  .milestone-title { font-family: var(--font-display); font-size: 21px; font-weight: 500; fill: var(--fg); font-style: italic; }
  .milestone-sub   { font-family: var(--font-mono); font-size: 11px; fill: var(--muted); letter-spacing: 0.02em; }

  .flow-arrow { fill: none; stroke: var(--muted-light); stroke-width: 1; opacity: 0.7; }
  .section-label {
    font-family: var(--font-mono); font-size: 11px;
    fill: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 500;
  }
  .end-label {
    font-family: var(--font-mono); font-size: 11px;
    fill: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; font-weight: 600;
    text-anchor: middle;
  }
  .end-sub { font-family: var(--font-mono); font-size: 11px; fill: var(--muted-light); text-anchor: middle; }

  .satellites {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }
  .satellite {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 0.75rem 0.85rem 0.65rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    outline: none;
  }
  .satellite:hover { background: var(--bg-soft); border-color: var(--accent-coord); }
  .satellite:focus-visible { border-color: var(--accent-human); border-width: 2px; padding: calc(0.75rem - 1px) calc(0.85rem - 1px) calc(0.65rem - 1px); }
  .satellite[aria-selected="true"] {
    border-color: var(--accent-human); background: var(--accent-human-soft);
    border-width: 2px; padding: calc(0.75rem - 1px) calc(0.85rem - 1px) calc(0.65rem - 1px);
  }
  .satellite[data-has-working="true"]:not([aria-selected="true"]) {
    border-color: var(--accent-ia); background: var(--accent-ia-soft);
  }
  .satellite[data-all-done="true"]:not([aria-selected="true"]) {
    border-color: var(--accent-cda); background: var(--accent-cda-soft);
  }
  .satellite__head { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.35rem; }
  .satellite__code  { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; color: var(--fg-soft); text-transform: uppercase; }
  .satellite__count { font-size: 0.72rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .satellite[data-has-working="true"] .satellite__count { color: var(--accent-ia); font-weight: 600; }
  .satellite[data-all-done="true"]    .satellite__count { color: var(--accent-cda); font-weight: 600; }
  .satellite__title { font-family: var(--font-display); font-size: 1rem; font-style: italic; color: var(--fg); margin-bottom: 0.15rem; }
  .satellite__sub   { font-size: 0.72rem; color: var(--muted-light); }

  .right {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: clamp(0.85rem, 1.5vw, 1.25rem);
    display: flex; flex-direction: column;
    min-width: 0; min-height: 380px;
    overflow: hidden;
  }
  @media (min-width: 980px) {
    .right { max-height: calc(100vh - 8rem); }
  }

  .panel-empty {
    margin: auto;
    text-align: center;
    color: var(--muted-light);
    font-style: italic; font-size: 0.86rem;
    padding: 2rem 1rem;
  }
  .panel-empty .hint { display: block; margin-top: 0.5rem; font-size: 0.78rem; color: var(--muted-light); }

  .panel { display: flex; flex-direction: column; min-height: 0; height: 100%; }
  .panel__back {
    font-family: var(--font-mono); font-size: 0.74rem;
    color: var(--muted); background: transparent; border: none;
    padding: 0 0 0.5rem 0; cursor: pointer; align-self: flex-start;
    letter-spacing: 0.02em;
  }
  .panel__back:hover { color: var(--accent-human); }
  .panel__head { padding-bottom: 0.75rem; margin-bottom: 0.85rem; border-bottom: 1px dashed var(--border); }
  .panel__cat   { font-size: 0.74rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.3rem; }
  .panel__title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 500; font-style: italic; color: var(--fg); margin-bottom: 0.2rem; }
  .panel__sub   { font-size: 0.82rem; color: var(--muted); }
  .panel__sub strong { color: var(--fg-soft); font-weight: 600; }

  .panel__body { overflow-y: auto; flex: 1; min-height: 0; padding-right: 0.25rem; }
  .panel__body::-webkit-scrollbar { width: 6px; }
  .panel__body::-webkit-scrollbar-track { background: var(--bg-soft); }
  .panel__body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .panel__list { display: flex; flex-direction: column; }
  .voce {
    display: grid;
    grid-template-columns: 1.6rem 3rem 1fr auto;
    gap: 0.5rem;
    align-items: baseline;
    padding: 0.3rem 0.25rem;
    cursor: pointer;
    border-radius: 1px;
    outline: none;
  }
  .voce:hover { background: var(--bg-soft); }
  .voce:focus-visible { background: var(--bg-soft); outline: 1px solid var(--accent-human); outline-offset: -1px; }
  .voce__state { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .voce[data-stato="completato"]     .voce__state { color: var(--accent-cda); }
  .voce[data-stato="in lavorazione"] .voce__state { color: var(--accent-ia); font-weight: 600; }
  .voce[data-stato="sospeso"]        .voce__state { color: var(--muted-light); }
  .voce__codice { font-size: 0.8rem; font-weight: 600; color: var(--fg-soft); font-variant-numeric: tabular-nums; }
  .voce__name { font-size: 0.82rem; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .voce[data-stato="completato"] .voce__name {
    color: var(--muted); text-decoration: line-through;
    text-decoration-color: var(--muted-light); text-decoration-thickness: 1px;
  }
  .voce[data-stato="sospeso"] .voce__name { color: var(--muted-light); }
  .voce__priority { font-size: 0.82rem; color: var(--muted-light); width: 1rem; text-align: center; }
  .voce[data-priorita="alta"]  .voce__priority { color: var(--accent-human); }
  .voce[data-priorita="media"] .voce__priority { color: var(--accent-coord); }

  .panel__empty-list { padding: 0.75rem 0; color: var(--muted-light); font-style: italic; font-size: 0.82rem; }

  .super { display: flex; flex-direction: column; gap: 0.75rem; }
  .super__meta {
    display: grid;
    grid-template-columns: 6rem 1fr;
    gap: 0.4rem 0.85rem;
    font-size: 0.84rem;
    align-items: baseline;
  }
  .super__label { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.05em; text-transform: lowercase; }
  .super__value { color: var(--fg); }
  .super__value--stato { font-weight: 600; }
  .super__value--stato[data-stato="in lavorazione"] { color: var(--accent-ia); }
  .super__value--stato[data-stato="completato"]     { color: var(--accent-cda); }
  .super__value--stato[data-stato="sospeso"]        { color: var(--muted-light); }
  .super__value--priorita[data-priorita="alta"]  { color: var(--accent-human); font-weight: 600; }
  .super__value--priorita[data-priorita="media"] { color: var(--accent-coord); }
  .super__note-label { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.05em; text-transform: lowercase; margin-top: 0.35rem; }
  .super__note {
    background: var(--bg-soft);
    border-left: 2px solid var(--accent-coord);
    padding: 0.6rem 0.85rem;
    font-size: 0.86rem; color: var(--fg-soft);
    line-height: 1.6; white-space: pre-wrap;
  }

  .loading, .error-box {
    padding: 1.25rem 1.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
  }
  .loading { color: var(--muted); font-style: italic; border-left: 3px solid var(--muted); }
  .error-box { border-left: 3px solid var(--accent-human); font-size: 0.85rem; }
  .error-box h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.6rem; color: var(--accent-human); }
  .error-box p { color: var(--fg-soft); margin-bottom: 0.5rem; }
  .error-box ul { padding-left: 1.5rem; color: var(--muted); }
  .error-box code { background: var(--bg-soft); padding: 0.05rem 0.35rem; color: var(--accent-coord); font-size: 0.95em; }

  .foot {
    display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
    font-size: 0.74rem; color: var(--muted);
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  .foot a { color: var(--accent-coord); text-decoration: none; border-bottom: 1px dotted var(--border-strong); }
  .foot a:hover { color: var(--accent-human); border-bottom-color: var(--accent-human); }
</style>
</head>

<body>

<div class="app">

  <header class="head">
    <div class="head__title">
      ebdomadario <span class="sep">·</span> roadmap
    </div>
    <div class="head__meta">
      <span id="counter" class="counter">—</span>
      <button id="refresh" class="refresh-btn" type="button">aggiorna</button>
    </div>
  </header>

  <div class="main">

    <div class="left">
      <div id="schema-wrap" class="schema-wrap">
        <div class="loading">caricamento dei dati…</div>
      </div>
      <div id="satellites" class="satellites" style="display:none;"></div>
    </div>

    <div id="right" class="right">
      <div class="panel-empty">
        seleziona un nodo nello schema per vederne il contenuto
        <span class="hint">e una voce nella lista per il super-dettaglio</span>
      </div>
    </div>

  </div>

  <footer class="foot">
    <span id="last-updated">—</span>
    <span><a href="index.html">↩ vetrina del progetto</a></span>
  </footer>

</div>

<script>
(function () {

  const DATA_URL = './data.json';

  function stationMatch(n) {
    const padded = String(n).padStart(2, '0');
    const re = new RegExp('^(F)?' + padded + '(\\b|[.\\-_])', 'i');
    return function (it) {
      if (it.categoria !== 'Fase sviluppo') return false;
      const cod = String(it.codice || '').trim();
      if (!cod) return false;
      return re.test(cod) || cod === padded || cod === ('F' + padded);
    };
  }

  const SCHEMA = {
    viewBox: '0 0 1040 900',
    sectionLabels: [
      { text: 'parte 1 — preparazione', x: 20,  y: 22 },
      { text: 'parte 2 — sviluppo',     x: 20,  y: 442 }
    ],
    nodes: [
      { id: 'A', x: 20,  y: 50, w: 180, h: 110, code: 'A', title: 'Prompt 1.0', subtitle: '17 agenti',
        match: it => it.categoria === 'Blocco A' },
      { id: 'B', x: 225, y: 50, w: 180, h: 110, code: 'B', title: 'Corpus', subtitle: 'Zotero + policy',
        match: it => it.categoria === 'Blocco B' },
      { id: 'C', x: 430, y: 50, w: 180, h: 110, code: 'C', title: 'Blocker tecnici', subtitle: '5+1 artefatti',
        match: it => it.categoria === 'Blocco C' },
      { id: 'D', x: 635, y: 50, w: 180, h: 110, code: 'D', title: 'Privacy', subtitle: 'GDPR + IA',
        match: it => it.categoria === 'Blocco D' },
      { id: 'E', x: 840, y: 50, w: 180, h: 110, code: 'E', title: 'Test', subtitle: '9 validazioni',
        match: it => it.categoria === 'Blocco E' },

      { id: '01', x: 20,  y: 472, w: 180, h: 110, code: '01', title: 'Fabbrica core', subtitle: '12 stazioni',           match: stationMatch(1) },
      { id: '02', x: 225, y: 472, w: 180, h: 110, code: '02', title: 'CdA MVP',       subtitle: '5 agenti',               match: stationMatch(2) },
      { id: '03', x: 430, y: 472, w: 180, h: 110, code: '03', title: 'Sito pubblico', subtitle: 'Next.js',                match: stationMatch(3) },
      { id: '04', x: 635, y: 472, w: 180, h: 110, code: '04', title: 'Integrazione',  subtitle: 'end-to-end',             match: stationMatch(4) },
      { id: '05', x: 840, y: 472, w: 180, h: 110, code: '05', title: 'Numero zero',   subtitle: 'non pubblico · TEST #8', match: stationMatch(5) },
      { id: '06', x: 20,  y: 622, w: 180, h: 110, code: '06', title: 'Lancio pubblico',  subtitle: 'numero I',           match: stationMatch(6) },
      { id: '07', x: 225, y: 622, w: 180, h: 110, code: '07', title: 'Stabilizzazione', subtitle: '+ agenti fase 2',     match: stationMatch(7) },
      { id: '08', x: 430, y: 622, w: 180, h: 110, code: '08', title: 'Monetizzazione',  subtitle: 'catalogo PDF',        match: stationMatch(8) },
      { id: '09', x: 635, y: 622, w: 180, h: 110, code: '09', title: 'Capoletteri',    subtitle: 'se TEST #1 ok',        match: stationMatch(9) },
      { id: '10', x: 840, y: 622, w: 180, h: 110, code: '10', title: 'Console interna', subtitle: 'parallela',           match: stationMatch(10) }
    ],
    milestone: {
      x: 220, y: 250, w: 600, h: 100,
      title: 'Apertura di Claude Code',
      subtitle: 'da idea + decisioni a sistema in costruzione',
      label: 'milestone strutturale',
      labelY: 240
    },
    end: {
      labelY: 815, subY: 840,
      label: 'messa a regime',
      sub:   'pubblicazione domenicale stabile · monetizzazione attiva post TEST #5'
    }
  };

  const SATELLITES = [
    { id: 'TEST',  code: 'TEST',  title: 'Test pre-prototipo', subtitle: 'validazioni trasversali',
      match: it => it.categoria === 'TEST' },
    { id: 'ASSET', code: 'ASSET', title: 'Asset trasversale',  subtitle: 'documenti e configurazioni',
      match: it => it.categoria === 'Asset trasversale' }
  ];

  const STATE_SYMBOLS = {
    'completato':     '[\u2713]',
    'in lavorazione': '[~]',
    'da iniziare':    '[ ]',
    'sospeso':        '[-]'
  };
  const PRIORITY_SYMBOLS = { 'alta': '\u25CF', 'media': '\u25D0', 'bassa': '\u25CB' };

  let allItems = [];
  let snapshotAt = null;
  let selectedNodeId = null;
  let selectedVoceId = null;
  let nodeTasksCache = {};

  const $  = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

  function el(tag, opts, children) {
    opts = opts || {};
    const e = document.createElement(tag);
    if (opts.class) e.className = opts.class;
    if (opts.text != null) e.textContent = opts.text;
    if (opts.html != null) e.innerHTML = opts.html;
    if (opts.attrs) Object.keys(opts.attrs).forEach(k => e.setAttribute(k, opts.attrs[k]));
    if (opts.data)  Object.keys(opts.data ).forEach(k => e.dataset[k] = opts.data[k]);
    if (children) children.forEach(c => {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
    return e;
  }

  function svgEl(tag, attrs, children) {
    const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) Object.keys(attrs).forEach(k => e.setAttribute(k, attrs[k]));
    if (children) children.forEach(c => {
      if (typeof c === 'string') e.appendChild(document.createTextNode(c));
      else if (c) e.appendChild(c);
    });
    return e;
  }

  function escapeHTML(s) {
    return String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  function naturalCompare(a, b) {
    const re = /(\d+)|(\D+)/g;
    const ax = String(a || '').match(re) || [];
    const bx = String(b || '').match(re) || [];
    for (let i = 0; i < Math.min(ax.length, bx.length); i++) {
      const an = parseInt(ax[i], 10);
      const bn = parseInt(bx[i], 10);
      if (!isNaN(an) && !isNaN(bn)) { if (an !== bn) return an - bn; }
      else { if (ax[i] !== bx[i]) return ax[i] < bx[i] ? -1 : 1; }
    }
    return ax.length - bx.length;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      const pad = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    } catch (e) { return iso; }
  }

  function tasksForNode(node) {
    if (nodeTasksCache[node.id]) return nodeTasksCache[node.id];
    const arr = allItems.filter(node.match).sort((a, b) => naturalCompare(a.codice, b.codice));
    nodeTasksCache[node.id] = arr;
    return arr;
  }

  function nodeStats(node) {
    const tasks = tasksForNode(node);
    const total = tasks.length;
    const completed = tasks.filter(t => t.stato === 'completato').length;
    const inWorking = tasks.filter(t => t.stato === 'in lavorazione').length;
    const pct = total > 0 ? Math.round(100 * completed / total) : 0;
    return {
      total, completed, inWorking, pct,
      hasWorking: inWorking > 0,
      allDone: total > 0 && completed === total
    };
  }

  function renderCounter() {
    const inLav      = allItems.filter(i => i.stato === 'in lavorazione').length;
    const altaAperta = allItems.filter(i =>
      i.priorita === 'alta' && (i.stato === 'in lavorazione' || i.stato === 'da iniziare')
    ).length;
    const cnt = $('#counter');
    cnt.innerHTML = '';
    cnt.appendChild(el('strong', { text: String(inLav) }));
    cnt.appendChild(document.createTextNode(' in lavorazione · '));
    cnt.appendChild(el('span', { class: 'alta', text: String(altaAperta) }));
    cnt.appendChild(document.createTextNode(' alta priorità'));
  }

  function renderSchema() {
    const wrap = $('#schema-wrap');
    wrap.innerHTML = '';

    const svg = svgEl('svg', {
      viewBox: SCHEMA.viewBox,
      xmlns: 'http://www.w3.org/2000/svg',
      role: 'img', 'aria-label': 'mappa della roadmap'
    });

    const defs = svgEl('defs');
    defs.appendChild(svgEl('marker', {
      id: 'arrow', viewBox: '0 0 10 10',
      refX: 8, refY: 5, markerWidth: 6, markerHeight: 6, orient: 'auto'
    }, [
      svgEl('path', { d: 'M 0 0 L 10 5 L 0 10 z', fill: 'currentColor', opacity: 0.7 })
    ]));
    svg.appendChild(defs);

    SCHEMA.sectionLabels.forEach(lbl => {
      svg.appendChild(svgEl('text', { x: lbl.x, y: lbl.y, class: 'section-label' }, [lbl.text]));
    });

    const m = SCHEMA.milestone;
    const mTopY = m.y;
    const mBotY = m.y + m.h;
    const mLeftX  = m.x + 60;
    const mRightX = m.x + m.w - 60;

    SCHEMA.nodes.filter(n => /^[A-F]$/.test(n.id)).forEach((n, i, arr) => {
      const sx = n.x + n.w / 2;
      const sy = n.y + n.h;
      const tx = mLeftX + (mRightX - mLeftX) * (i / Math.max(1, arr.length - 1));
      svg.appendChild(svgEl('path', {
        d: 'M ' + sx + ' ' + sy + ' L ' + tx + ' ' + mTopY,
        class: 'flow-arrow', 'marker-end': 'url(#arrow)'
      }));
    });

    SCHEMA.nodes.filter(n => /^0[1-5]$/.test(n.id)).forEach((n, i, arr) => {
      const sx = mLeftX + (mRightX - mLeftX) * (i / Math.max(1, arr.length - 1));
      const sy = mBotY;
      const tx = n.x + n.w / 2;
      const ty = n.y;
      svg.appendChild(svgEl('path', {
        d: 'M ' + sx + ' ' + sy + ' L ' + tx + ' ' + ty,
        class: 'flow-arrow', 'marker-end': 'url(#arrow)'
      }));
    });

    const node08 = SCHEMA.nodes.find(n => n.id === '08');
    if (node08) {
      svg.appendChild(svgEl('path', {
        d: 'M ' + (node08.x + node08.w / 2) + ' ' + (node08.y + node08.h)
         + ' L ' + (node08.x + node08.w / 2) + ' 790',
        class: 'flow-arrow', 'marker-end': 'url(#arrow)'
      }));
    }

    svg.appendChild(svgEl('text', {
      x: m.x + m.w / 2, y: m.labelY,
      class: 'section-label', 'text-anchor': 'middle'
    }, [m.label]));
    svg.appendChild(svgEl('rect', {
      x: m.x, y: m.y, width: m.w, height: m.h, class: 'milestone-rect'
    }));
    svg.appendChild(svgEl('text', {
      x: m.x + m.w / 2, y: m.y + 42,
      class: 'milestone-title', 'text-anchor': 'middle'
    }, [m.title]));
    svg.appendChild(svgEl('text', {
      x: m.x + m.w / 2, y: m.y + 70,
      class: 'milestone-sub', 'text-anchor': 'middle'
    }, [m.subtitle]));

    SCHEMA.nodes.forEach(node => svg.appendChild(renderNode(node)));

    svg.appendChild(svgEl('text', {
      x: m.x + m.w / 2, y: SCHEMA.end.labelY,
      class: 'end-label'
    }, [SCHEMA.end.label]));
    svg.appendChild(svgEl('text', {
      x: m.x + m.w / 2, y: SCHEMA.end.subY,
      class: 'end-sub'
    }, [SCHEMA.end.sub]));

    wrap.appendChild(svg);
  }

  function renderNode(node) {
    const stats = nodeStats(node);
    const isSelected = selectedNodeId === node.id;

    const g = svgEl('g', {
      class: 'node-group',
      role: 'button', tabindex: '0',
      'aria-label': node.title + ' ' + (node.subtitle || ''),
      'aria-selected': isSelected ? 'true' : 'false'
    });
    g.dataset.id = node.id;
    g.dataset.hasWorking = stats.hasWorking ? 'true' : 'false';
    g.dataset.allDone    = stats.allDone    ? 'true' : 'false';

    g.appendChild(svgEl('rect', {
      x: node.x, y: node.y, width: node.w, height: node.h, class: 'node-rect'
    }));

    g.appendChild(svgEl('text', {
      x: node.x + 12, y: node.y + 22, class: 'node-code'
    }, [node.code]));

    if (stats.total > 0) {
      g.appendChild(svgEl('text', {
        x: node.x + node.w - 12, y: node.y + 22,
        class: 'node-count', 'text-anchor': 'end'
      }, [stats.completed + '/' + stats.total]));
    }

    g.appendChild(svgEl('text', {
      x: node.x + node.w / 2, y: node.y + 55,
      class: 'node-title', 'text-anchor': 'middle'
    }, [node.title]));

    g.appendChild(svgEl('text', {
      x: node.x + node.w / 2, y: node.y + 76,
      class: 'node-subtitle', 'text-anchor': 'middle'
    }, [node.subtitle || '']));

    const barX = node.x + 14;
    const barY = node.y + node.h - 16;
    const barW = node.w - 28;
    const barH = 3;
    g.appendChild(svgEl('rect', { x: barX, y: barY, width: barW, height: barH, class: 'bar-bg' }));
    if (stats.total > 0 && stats.pct > 0) {
      g.appendChild(svgEl('rect', {
        x: barX, y: barY, width: barW * (stats.pct / 100), height: barH, class: 'bar-fg'
      }));
    }

    g.addEventListener('click', () => selectNode(node.id));
    g.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectNode(node.id); }
    });

    return g;
  }

  function renderSatellites() {
    const wrap = $('#satellites');
    wrap.innerHTML = '';
    wrap.style.display = 'grid';

    SATELLITES.forEach(sat => {
      const tasks = allItems.filter(sat.match).sort((a, b) => naturalCompare(a.codice, b.codice));
      nodeTasksCache[sat.id] = tasks;
      const total = tasks.length;
      const completed = tasks.filter(t => t.stato === 'completato').length;
      const hasWorking = tasks.some(t => t.stato === 'in lavorazione');
      const allDone = total > 0 && completed === total;
      const isSelected = selectedNodeId === sat.id;

      const div = el('div', {
        class: 'satellite',
        attrs: { role: 'button', tabindex: '0', 'aria-label': sat.title, 'aria-selected': isSelected ? 'true' : 'false' },
        data: { id: sat.id, hasWorking: hasWorking ? 'true' : 'false', allDone: allDone ? 'true' : 'false' }
      });

      const head = el('div', { class: 'satellite__head' });
      head.appendChild(el('span', { class: 'satellite__code', text: sat.code }));
      head.appendChild(el('span', { class: 'satellite__count', text: total > 0 ? (completed + '/' + total) : '—' }));
      div.appendChild(head);
      div.appendChild(el('div', { class: 'satellite__title', text: sat.title }));
      div.appendChild(el('div', { class: 'satellite__sub', text: sat.subtitle }));

      div.addEventListener('click', () => selectNode(sat.id));
      div.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectNode(sat.id); }
      });

      wrap.appendChild(div);
    });
  }

  function findNode(id) {
    return SCHEMA.nodes.find(n => n.id === id) || SATELLITES.find(s => s.id === id);
  }

  function renderPanel() {
    const right = $('#right');
    right.innerHTML = '';

    if (!selectedNodeId) {
      right.appendChild(el('div', { class: 'panel-empty' }, [
        document.createTextNode('seleziona un nodo nello schema per vederne il contenuto'),
        el('span', { class: 'hint', text: 'e una voce nella lista per il super-dettaglio' })
      ]));
      return;
    }

    const node = findNode(selectedNodeId);
    if (!node) {
      right.appendChild(el('div', { class: 'panel-empty', text: 'nodo non trovato' }));
      return;
    }

    if (selectedVoceId) renderSuperDetail(right, node);
    else                 renderCategoryDetail(right, node);
  }

  function renderCategoryDetail(right, node) {
    const tasks = tasksForNode(node);
    const stats = nodeStats(node);

    const panel = el('div', { class: 'panel' });

    const head = el('div', { class: 'panel__head' });
    head.appendChild(el('div', { class: 'panel__cat', text: node.code }));
    head.appendChild(el('div', { class: 'panel__title', text: node.title }));
    const subPart = el('div', { class: 'panel__sub' });
    subPart.appendChild(document.createTextNode(node.subtitle || ''));
    if (stats.total > 0) {
      subPart.appendChild(document.createTextNode(node.subtitle ? ' · ' : ''));
      subPart.appendChild(el('strong', { text: stats.completed + '/' + stats.total }));
      subPart.appendChild(document.createTextNode(' completate · ' + stats.pct + '%'));
    }
    head.appendChild(subPart);
    panel.appendChild(head);

    const body = el('div', { class: 'panel__body' });

    if (tasks.length === 0) {
      body.appendChild(el('div', {
        class: 'panel__empty-list',
        text: '— nessuna voce ancora presente in Notion per questo nodo —'
      }));
    } else {
      const list = el('div', { class: 'panel__list' });
      tasks.forEach(t => list.appendChild(renderVoce(t)));
      body.appendChild(list);
    }

    panel.appendChild(body);
    right.appendChild(panel);
  }

  function renderVoce(t) {
    const id = t.id || (t.codice + '|' + (t.categoria || ''));
    const stato = t.stato || 'da iniziare';
    const priorita = t.priorita || null;

    const v = el('div', {
      class: 'voce',
      attrs: { role: 'button', tabindex: '0' },
      data: { stato: stato, priorita: priorita || '', id: id }
    });

    v.appendChild(el('div', { class: 'voce__state', text: STATE_SYMBOLS[stato] || '[ ]' }));
    v.appendChild(el('div', { class: 'voce__codice', text: t.codice || '—' }));
    v.appendChild(el('div', {
      class: 'voce__name', text: t.nome || '(senza nome)',
      attrs: { title: t.nome || '' }
    }));
    v.appendChild(el('div', {
      class: 'voce__priority',
      text: priorita ? (PRIORITY_SYMBOLS[priorita] || '') : ''
    }));

    v.addEventListener('click', () => selectVoce(id));
    v.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectVoce(id); }
    });

    return v;
  }

  function renderSuperDetail(right, node) {
    const tasks = tasksForNode(node);
    const voce = tasks.find(t => (t.id || (t.codice + '|' + (t.categoria || ''))) === selectedVoceId);
    if (!voce) { selectedVoceId = null; renderCategoryDetail(right, node); return; }

    const panel = el('div', { class: 'panel' });

    const back = el('button', {
      class: 'panel__back',
      text: '↩ torna alla lista di ' + node.code,
      attrs: { type: 'button' }
    });
    back.addEventListener('click', () => selectVoce(null));
    panel.appendChild(back);

    const head = el('div', { class: 'panel__head' });
    head.appendChild(el('div', { class: 'panel__cat', text: node.code + ' · ' + (voce.categoria || '') }));
    head.appendChild(el('div', { class: 'panel__title', text: (voce.codice ? voce.codice + '  ' : '') + (voce.nome || '') }));
    panel.appendChild(head);

    const body = el('div', { class: 'panel__body' });
    const sup = el('div', { class: 'super' });

    const meta = el('div', { class: 'super__meta' });

    meta.appendChild(el('div', { class: 'super__label', text: 'stato' }));
    meta.appendChild(el('div', {
      class: 'super__value super__value--stato',
      text: voce.stato || '—', data: { stato: voce.stato || '' }
    }));

    meta.appendChild(el('div', { class: 'super__label', text: 'priorità' }));
    meta.appendChild(el('div', {
      class: 'super__value super__value--priorita',
      text: voce.priorita || '—', data: { priorita: voce.priorita || '' }
    }));

    meta.appendChild(el('div', { class: 'super__label', text: 'decisioni' }));
    meta.appendChild(el('div', { class: 'super__value', text: voce.decisioni || '—' }));

    meta.appendChild(el('div', { class: 'super__label', text: 'aggiornato' }));
    meta.appendChild(el('div', { class: 'super__value', text: formatDate(voce.aggiornato_il) }));

    sup.appendChild(meta);

    if (voce.note && String(voce.note).trim()) {
      sup.appendChild(el('div', { class: 'super__note-label', text: 'note' }));
      sup.appendChild(el('div', { class: 'super__note', text: voce.note }));
    }

    body.appendChild(sup);
    panel.appendChild(body);

    right.appendChild(panel);
  }

  function selectNode(id) {
    if (selectedNodeId === id) { selectedNodeId = null; selectedVoceId = null; }
    else { selectedNodeId = id; selectedVoceId = null; }
    updateSelectionVisuals();
    renderPanel();
  }

  function selectVoce(id) {
    selectedVoceId = id;
    renderPanel();
  }

  function updateSelectionVisuals() {
    $$('.node-group').forEach(g => {
      g.setAttribute('aria-selected', g.dataset.id === selectedNodeId ? 'true' : 'false');
    });
    $$('.satellite').forEach(g => {
      g.setAttribute('aria-selected', g.dataset.id === selectedNodeId ? 'true' : 'false');
    });
  }

  function renderFooter() {
    const parts = [];
    if (snapshotAt) {
      parts.push('snapshot: ' + formatDate(snapshotAt));
    } else {
      const dates = allItems.map(i => i.aggiornato_il).filter(Boolean).sort();
      if (dates.length) parts.push('ultima modifica notion: ' + formatDate(dates[dates.length - 1]));
    }
    parts.push('aggiornamento automatico ogni ~15 min');
    $('#last-updated').textContent = parts.join('   ·   ');
  }

  function renderError(message) {
    const wrap = $('#schema-wrap');
    wrap.innerHTML = '';
    const err = el('div', { class: 'error-box' });
    err.innerHTML =
      '<h3>impossibile caricare i dati</h3>' +
      '<p>' + escapeHTML(message) + '</p>' +
      '<p>possibili cause:</p>' +
      '<ul>' +
        '<li>il file <code>data.json</code> non esiste ancora — il workflow di sync non è stato eseguito.</li>' +
        '<li>il path è errato — verifica <code>DATA_URL</code> in cima allo script.</li>' +
        '<li>la build di GitHub Pages è in coda — attendi qualche minuto.</li>' +
      '</ul>';
    wrap.appendChild(err);
    $('#satellites').style.display = 'none';
    $('#counter').textContent = '—';
    $('#last-updated').textContent = '—';
    const right = $('#right');
    right.innerHTML = '';
    right.appendChild(el('div', { class: 'panel-empty', text: 'dati non disponibili' }));
  }

  async function load() {
    const btn = $('#refresh');
    btn.disabled = true;
    btn.textContent = 'caricamento…';
    try {
      const url = DATA_URL + '?t=' + Date.now();
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' — ' + res.statusText);
      const data = await res.json();
      allItems = Array.isArray(data.items) ? data.items : [];
      snapshotAt = data.snapshot_at || null;
      nodeTasksCache = {};

      if (selectedNodeId && selectedVoceId) {
        const node = findNode(selectedNodeId);
        if (node) {
          const tasks = tasksForNode(node);
          const still = tasks.find(t => (t.id || (t.codice + '|' + (t.categoria || ''))) === selectedVoceId);
          if (!still) selectedVoceId = null;
        }
      }

      renderCounter();
      renderSchema();
      renderSatellites();
      renderPanel();
      renderFooter();
    } catch (err) {
      renderError(err.message || String(err));
    } finally {
      btn.disabled = false;
      btn.textContent = 'aggiorna';
    }
  }

  $('#refresh').addEventListener('click', load);
  load();

})();
</script>

</body>
</html>
